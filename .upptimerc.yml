owner: proteczi
repo: sportzi-status

workflowSchedule:
  uptime: "0 * * * *"         # hourly
  graphs: "0 0 * * *"         # daily midnight
  responseTime: "0 23 * * *"  # daily 11pm
  staticSite: "0 1 * * *"     # daily 1am
  summary: "0 0 * * *"        # daily midnight
  updates: "0 3 * * *"        # daily 3am

sites:
  - name: Web
    url: https://sportzi.co/
    maxResponseTime: 5000

  - name: API
    url: https://api.sportzi.co/
    maxResponseTime: 3000

  - name: Score
    url: https://score.sportzi.co/
    maxResponseTime: 5000

  - name: API Health (DB)
    url: https://api.sportzi.co/health
    expectedStatusCodes: [200]
    maxResponseTime: 3000


status-website:
  name: Sportzi Status
  cname: status.sportzi.co
  logoUrl: https://sportzi.co/logo.svg
  introTitle: "Welcome to Sportzi Status"
  introMessage: "We monitor the health of our services and provide real-time updates on any incidents. Stay informed about the status of our Web, API, and Score services here."
  navbar:
    - title: Status
      href: /
    - title: GitHub
      href: https://github.com/$OWNER/$REPO
# Notification channels — uncomment and configure as needed
